<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar | SmartLaundry</title>
    <!-- Hubungkan ke CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="auth-page">

<section class="auth-page-wrapper">
    <div class="auth-container">

      
        <div class="auth-left">
            <img src="Gambar/xian.jpg" alt="Register">
            <h2>Bergabung Bersama Kami</h2>
            <p>Daftarkan akun SmartLaundry dan nikmati kemudahan mencuci tanpa ribet.</p>
        </div>

        <div class="auth-right">
            <h2>Daftar Akun</h2>
            <p>Lengkapi data di bawah ini.</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Masukkan Email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" id="password" placeholder="Masukkan Password" required>
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <div class="password-box">
                        <input type="password" id="confirmPassword" placeholder="Ulangi Password" required>
                        <i class="fa-solid fa-eye" id="toggleConfirm"></i>
                    </div>
                </div>

                <button type="submit" class="auth-btn">Daftar</button>
            </form>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <div class="social-login">
                <div class="social-btn">
                    <i class="fa-brands fa-google" style="color: #ea4335;"></i> Google
                </div>
                <div class="social-btn">
                    <i class="fa-brands fa-facebook" style="color: #1877f2;"></i> Facebook
                </div>
            </div>

            <div class="auth-option">
                Sudah punya akun? <a href="Login.html">Login</a>
            </div>
        </div>

    </div>
</section>

<script src="sigin.js"></script>
</body>
</html>
