<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartLaundry</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="auth-page">

<section class="auth-page-wrapper">
    <div class="auth-container">
        
        <div class="auth-left">
            <img src="Gambar/fun.jpg" alt="Login">
            <h2>Selamat Datang!</h2>
            <p>Masuk ke akun SmartLaundry untuk mengelola pesanan laundry dengan mudah, cepat, dan praktis.</p>
        </div>

        <div class="auth-right">
            <h2>Masuk</h2>
            <p>Silakan login menggunakan akun Anda.</p>
            
            <form>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Masukkan Email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" id="password" placeholder="Masukkan Password" required>
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div>
                </div>
                
                <button type="submit" class="auth-btn">Login</button>
            </form>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <div class="social-login">
                <div class="social-btn">
                    <i class="fa-brands fa-google" style="color: #ea4335;"></i> Google
                </div>
                <div class="social-btn">
                    <i class="fa-brands fa-facebook" style="color: #1877f2;"></i> Facebook
                </div>
            </div>

            <div class="auth-option">
                Belum punya akun? <a href="sigin.html">Daftar Sekarang</a>
            </div>
        </div>

    </div>
</section>

<script src="login.js"></script>
</body>
</html>
